services:
  - type: web
    name: presale-wiki
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GDRIVE_FOLDER_ID
        sync: false
      - key: LITELLM_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET_JSON
        sync: false
      - key: GOOGLE_OAUTH_TOKEN_JSON
        sync: false
      - key: BASE_URL
        sync: false
